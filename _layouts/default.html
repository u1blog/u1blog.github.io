<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
  <link type="application/atom+xml" rel="alternate" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title | escape }}">
  <style>
    /* ================================================
       YOU WON — Blog Theme
       Dark warm · Literary · Intimate
       ================================================ */

    :root {
      --bg:           #0f0e0c;
      --bg-surface:   #161410;
      --bg-elevated:  #1e1a16;
      --text:         #f0ebe3;
      --text-muted:   #7a6e60;
      --text-faint:   #38302a;
      --accent:       #e8a44c;
      --accent-glow:  rgba(232, 164, 76, 0.12);
      --border:       #26211a;
      --border-soft:  #1e1a15;
      --max-w:        680px;
      --font-serif:   'Playfair Display', Georgia, serif;
      --font-sans:    'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --ease:         cubic-bezier(0.25, 0, 0.15, 1);
      --t:            0.22s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 18px;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      background-image:
        radial-gradient(ellipse 90% 50% at 50% -10%, rgba(232, 164, 76, 0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 110%, rgba(232, 164, 76, 0.03) 0%, transparent 50%);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---- Header ---- */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 0 2rem;
      background: rgba(15, 14, 12, 0.8);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2rem;
    }

    .site-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 400;
      font-style: italic;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
      flex-shrink: 0;
      transition: color var(--t) var(--ease);
    }
    .site-title:hover { color: var(--accent); }

    .site-nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .nav-link {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      position: relative;
      transition: color var(--t) var(--ease);
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width var(--t) var(--ease);
    }
    .nav-link:hover { color: var(--text); }
    .nav-link:hover::after { width: 100%; }

    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
      flex-shrink: 0;
    }
    .nav-toggle span {
      display: block;
      width: 100%;
      height: 1px;
      background: var(--text);
      transition: transform var(--t) var(--ease), opacity var(--t) var(--ease), width var(--t) var(--ease);
      transform-origin: center;
    }
    .nav-toggle.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; width: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    /* ---- Main ---- */
    main {
      flex: 1;
      width: 100%;
      max-width: calc(var(--max-w) + 4rem);
      margin: 0 auto;
      padding: 4.5rem 2rem 6rem;
    }

    /* ---- Animations ---- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- Home ---- */
    .home-hero {
      padding-bottom: 3.5rem;
      margin-bottom: 3rem;
      border-bottom: 1px solid var(--border);
      animation: fadeUp 0.65s var(--ease) both;
    }

    .home-hero-eyebrow {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      opacity: 0.85;
    }
    .home-hero-eyebrow::before {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--accent);
      flex-shrink: 0;
    }

    .home-hero h1 {
      font-family: var(--font-serif);
      font-size: clamp(3rem, 10vw, 5.25rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 1.5rem;
    }

    .home-hero .tagline {
      font-family: var(--font-sans);
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--text-muted);
      line-height: 1.7;
      max-width: 340px;
    }

    .posts-section {
      animation: fadeUp 0.65s var(--ease) 0.1s both;
    }

    .posts-heading {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 0;
    }

    .post-list { list-style: none; }

    .post-item {
      padding: 1.75rem 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .post-item:first-of-type { border-top: 1px solid var(--border-soft); margin-top: 1.75rem; }

    .post-item a.post-item-link {
      display: block;
      text-decoration: none;
    }

    .post-meta-line {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.55rem;
    }

    .post-date {
      font-family: var(--font-sans);
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }

    .post-category-tag {
      font-family: var(--font-sans);
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity var(--t);
    }
    .post-category-tag:hover { opacity: 1; }

    .post-item h2 {
      font-family: var(--font-serif);
      font-size: 1.45rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--text);
      display: inline;
      background-image: linear-gradient(var(--accent), var(--accent));
      background-size: 0 1px;
      background-position: 0 100%;
      background-repeat: no-repeat;
      transition: background-size var(--t) var(--ease), color var(--t) var(--ease);
    }
    .post-item:hover h2 {
      color: var(--accent);
      background-size: 100% 1px;
    }

    .post-excerpt {
      font-family: var(--font-sans);
      font-size: 0.83rem;
      color: var(--text-muted);
      margin-top: 0.7rem;
      line-height: 1.65;
    }

    /* ---- Post ---- */
    .post {
      animation: fadeUp 0.65s var(--ease) both;
    }

    .post-header {
      padding-bottom: 2.5rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
    }

    .post-header h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 7vw, 3.25rem);
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-bottom: 1.25rem;
    }

    .post-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      font-family: var(--font-sans);
      font-size: 0.72rem;
      color: var(--text-muted);
    }

    .post-content {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      line-height: 1.9;
      color: #ccc5ba;
    }
    .post-content p { margin-bottom: 1.6em; }
    .post-content p:last-child { margin-bottom: 0; }

    .post-content h2, .post-content h3, .post-content h4 {
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--text);
      margin: 2.5em 0 0.8em;
    }
    .post-content h2 { font-size: 1.15rem; }
    .post-content h3 { font-size: 1rem; }

    .post-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 164, 76, 0.3);
      transition: border-color var(--t);
    }
    .post-content a:hover { border-color: var(--accent); }

    .post-content blockquote {
      margin: 2.5rem 0;
      padding: 0.25rem 0 0.25rem 1.5rem;
      border-left: 2px solid var(--accent);
      font-style: italic;
      color: var(--text-muted);
    }

    .post-content code {
      font-size: 0.82em;
      background: var(--bg-elevated);
      padding: 0.12em 0.4em;
      border-radius: 3px;
      font-family: 'SF Mono', 'Fira Code', 'Menlo', monospace;
      color: var(--accent);
    }

    .post-content pre {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      overflow-x: auto;
      margin: 2rem 0;
    }
    .post-content pre code { background: none; padding: 0; color: var(--text); }

    .post-content ul, .post-content ol {
      padding-left: 1.4rem;
      margin-bottom: 1.6em;
    }
    .post-content li { margin-bottom: 0.4em; }

    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      margin: 2rem 0;
    }

    .post-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 3rem 0;
    }

    .post-footer {
      margin-top: 3.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    .back-link {
      font-family: var(--font-sans);
      font-size: 0.72rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--t);
    }
    .back-link:hover { color: var(--accent); }

    /* ---- Page (About etc.) ---- */
    .page {
      animation: fadeUp 0.65s var(--ease) both;
    }

    .page-header {
      padding-bottom: 2rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .page-header h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      font-weight: 700;
      line-height: 1.2;
    }

    .page-content {
      font-family: var(--font-sans);
      font-size: 0.98rem;
      line-height: 1.85;
      color: #ccc5ba;
    }
    .page-content p { margin-bottom: 1.4em; }
    .page-content a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 164, 76, 0.3);
      transition: border-color var(--t);
    }
    .page-content a:hover { border-color: var(--accent); }

    /* ---- Category ---- */
    .category-page { animation: fadeUp 0.65s var(--ease) both; }

    /* ---- Footer ---- */
    .site-footer {
      padding: 2rem;
      border-top: 1px solid var(--border);
    }

    .footer-inner {
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .footer-brand {
      font-family: var(--font-serif);
      font-size: 0.88rem;
      font-style: italic;
      color: var(--text-muted);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-family: var(--font-sans);
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color var(--t);
    }
    .footer-links a:hover { color: var(--accent); }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .site-header { padding: 0 1.25rem; }

      .nav-toggle { display: flex; }

      .site-nav {
        display: none;
        position: fixed;
        top: 58px;
        left: 0;
        right: 0;
        background: rgba(15, 14, 12, 0.97);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        padding: 2rem 1.5rem;
        flex-direction: column;
        align-items: flex-start;
        gap: 1.75rem;
      }
      .site-nav.open { display: flex; }

      .nav-link {
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        color: var(--text-muted);
      }

      main { padding: 2.5rem 1.25rem 4rem; }

      .footer-inner { justify-content: center; text-align: center; }
      .footer-links { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}" rel="author">{{ site.title | escape }}</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="site-nav">
        <span></span><span></span><span></span>
      </button>
      <nav class="site-nav" id="site-nav" role="navigation" aria-label="Site navigation">
        <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
        {%- if site.categories.size > 1 -%}
          {%- for category in site.categories -%}
            <a href="{{ site.baseurl }}/categories/{{ category[0] | slugify }}.html" class="nav-link">{{ category[0] }}</a>
          {%- endfor -%}
        {%- endif -%}
      </nav>
    </div>
  </header>

  <main role="main">
    {{ content }}
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-brand">{{ site.title | escape }}</span>
      <div class="footer-links">
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      var toggle = document.getElementById('nav-toggle');
      var nav = document.getElementById('site-nav');
      if (!toggle || !nav) return;
      toggle.addEventListener('click', function () {
        var isOpen = nav.classList.toggle('open');
        toggle.classList.toggle('open', isOpen);
        toggle.setAttribute('aria-expanded', String(isOpen));
      });
      document.addEventListener('click', function (e) {
        if (!nav.contains(e.target) && !toggle.contains(e.target)) {
          nav.classList.remove('open');
          toggle.classList.remove('open');
          toggle.setAttribute('aria-expanded', 'false');
        }
      });
    })();
  </script>

</body>
</html>
